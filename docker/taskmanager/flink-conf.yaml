# Flink TaskManager Configuration

# JobManager连接配置
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123

# TaskManager配置
taskmanager.bind-host: 0.0.0.0
taskmanager.host: taskmanager
taskmanager.rpc.port: 6122
taskmanager.data.port: 6121
taskmanager.memory.process.size: 1728m
taskmanager.memory.managed.fraction: 0.3
taskmanager.numberOfTaskSlots: 4

# ===== 大数据量网络配置 =====
taskmanager.memory.network.fraction: 0.2
taskmanager.memory.network.min: 128mb
taskmanager.memory.network.max: 512mb

# Netty 缓冲区优化
taskmanager.network.netty.client.connectTimeoutSec: 120
taskmanager.network.netty.sendReceiveBufferSize: 0
taskmanager.network.netty.num-arenas: 8
taskmanager.network.netty.threads.io: 4

# ===== 心跳超时配置（解决 LogMiner 导致的心跳超时）=====
heartbeat.interval: 10000
heartbeat.timeout: 180000
heartbeat.rpc-failure-threshold: 5

# ===== Akka/Pekko RPC 超时配置 =====
akka.ask.timeout: 60s
akka.lookup.timeout: 60s
akka.client.timeout: 60s

# ===== JVM GC 配置（减少 GC 停顿导致的心跳超时）=====
env.java.opts.taskmanager: -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=16m -XX:+ParallelRefProcEnabled -XX:+DisableExplicitGC

# Checkpoint配置
state.backend: hashmap
state.checkpoints.dir: file:///opt/flink/checkpoints
state.savepoints.dir: file:///opt/flink/savepoints

# 状态后端配置
state.backend.incremental: true
state.backend.local-recovery: true

# 并行度配置
parallelism.default: 4

# 日志配置
env.log.dir: /opt/flink/logs

# 类加载器配置
classloader.resolve-order: parent-first
