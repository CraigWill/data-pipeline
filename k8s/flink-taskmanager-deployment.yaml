apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: flink
spec:
  replicas: 3  # 默认 3 个 TaskManager，可根据需要调整
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      serviceAccountName: flink
      containers:
      - name: taskmanager
        image: flink-taskmanager:latest
        imagePullPolicy: IfNotPresent
        args: ["taskmanager"]
        ports:
        - containerPort: 6122
          name: rpc
        - containerPort: 6121
          name: data
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - org.apache.flink.runtime.taskexecutor.TaskManagerRunner
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pgrep
            - -f
            - org.apache.flink.runtime.taskexecutor.TaskManagerRunner
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        env:
        - name: JOB_MANAGER_RPC_ADDRESS
          value: "flink-jobmanager"
        - name: JOB_MANAGER_RPC_PORT
          value: "6123"
        - name: TASK_MANAGER_HEAP_SIZE
          value: "1024m"
        - name: TASK_MANAGER_MEMORY_PROCESS_SIZE
          value: "1728m"
        - name: TASK_MANAGER_NUMBER_OF_TASK_SLOTS
          value: "4"
        - name: TASK_MANAGER_RPC_PORT
          value: "6122"
        - name: TASK_MANAGER_DATA_PORT
          value: "6121"
        - name: TASK_MANAGER_NETWORK_MEMORY_MIN
          value: "128m"
        - name: TASK_MANAGER_NETWORK_MEMORY_MAX
          value: "512m"
        # Kubernetes HA 配置
        - name: HA_MODE
          value: "kubernetes"
        # 数据库配置（从 Secret 读取）
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-host
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-port
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-password
        - name: DATABASE_SID
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-sid
        - name: DATABASE_SCHEMA
          valueFrom:
            secretKeyRef:
              name: flink-secrets
              key: database-schema
        - name: DATABASE_TABLES
          value: "trans_info"
        - name: OUTPUT_PATH
          value: "/opt/flink/output/cdc"
        - name: TZ
          value: "Asia/Shanghai"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf
        - name: flink-checkpoints
          mountPath: /opt/flink/checkpoints
        - name: flink-savepoints
          mountPath: /opt/flink/savepoints
        - name: flink-logs
          mountPath: /opt/flink/logs
        - name: flink-output
          mountPath: /opt/flink/output
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
          items:
          - key: flink-conf.yaml
            path: flink-conf.yaml
          - key: log4j-console.properties
            path: log4j-console.properties
      - name: flink-checkpoints
        persistentVolumeClaim:
          claimName: flink-checkpoints-pvc
      - name: flink-savepoints
        persistentVolumeClaim:
          claimName: flink-savepoints-pvc
      - name: flink-logs
        emptyDir: {}
      - name: flink-output
        persistentVolumeClaim:
          claimName: flink-output-pvc
