apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flink-taskmanager-hpa
  namespace: flink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flink-taskmanager
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5分钟稳定期
      policies:
      - type: Percent
        value: 50  # 每次最多缩减50%
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60  # 1分钟稳定期
      policies:
      - type: Percent
        value: 100  # 每次最多扩展100%（翻倍）
        periodSeconds: 60
      - type: Pods
        value: 2  # 或每次增加2个Pod
        periodSeconds: 60
      selectPolicy: Max  # 选择扩展幅度最大的策略
