# 本地主机部署配置（无容器，内嵌 Tomcat）
# 激活方式: -Dspring.profiles.active=local

server:
  port: 5001

spring:
  datasource:
    url: jdbc:oracle:thin:@${DATABASE_HOST:localhost}:${DATABASE_PORT:1521}:${DATABASE_SID:helowin}
    username: ${DATABASE_USERNAME:finance_user}
    password: ${DATABASE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

# Flink REST API 地址（本地 Flink 集群）
app:
  flink:
    rest-urls:
      - ${FLINK_REST_URL:http://localhost:8081}

# Flink job JAR 路径（本地开发：使用 Maven 构建输出）
flink:
  job:
    jar-path: ${FLINK_JOB_JAR_PATH:flink-jobs/target/flink-jobs-1.0.0-SNAPSHOT.jar}
  checkpoint:
    dir: ${CHECKPOINT_DIR:file:///tmp/flink-checkpoints}
  savepoint:
    dir: ${SAVEPOINT_DIR:file:///tmp/flink-savepoints}

# 日志输出到文件
logging:
  file:
    name: logs/local/backend.log
  level:
    root: INFO
    com.realtime: DEBUG
