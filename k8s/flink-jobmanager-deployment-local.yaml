apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: flink
spec:
  replicas: 1  # 本地环境：单个 JobManager
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      serviceAccountName: flink
      securityContext:
        fsGroup: 9999
      initContainers:
      - name: fix-permissions
        image: flink-jobmanager:v3-jarfix
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'chown -R 9999:9999 /data/checkpoints /data/savepoints /data/ha /data/output']
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: flink-data
          mountPath: /data/checkpoints
          subPath: checkpoints
        - name: flink-data
          mountPath: /data/savepoints
          subPath: savepoints
        - name: flink-data
          mountPath: /data/ha
          subPath: ha
        - name: flink-data
          mountPath: /data/output
          subPath: output
      containers:
      - name: jobmanager
        image: flink-jobmanager:v3-jarfix
        imagePullPolicy: IfNotPresent
        args: ["jobmanager"]
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 6124
          name: blob-server
        - containerPort: 8081
          name: webui
        livenessProbe:
          httpGet:
            path: /overview
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /overview
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        env:
        - name: JOB_MANAGER_RPC_ADDRESS
          value: "flink-jobmanager"
        - name: JOB_MANAGER_RPC_PORT
          value: "6123"
        - name: JOB_MANAGER_HEAP_SIZE
          value: "1024m"
        - name: REST_PORT
          value: "8081"
        - name: PARALLELISM_DEFAULT
          value: "4"
        - name: CHECKPOINT_INTERVAL
          value: "300000"
        - name: CHECKPOINT_DIR
          value: "file:///opt/flink/checkpoints"
        - name: SAVEPOINT_DIR
          value: "file:///opt/flink/savepoints"
        - name: STATE_BACKEND
          value: "hashmap"
        # Kubernetes HA 配置（单节点模式）
        - name: HA_MODE
          value: "NONE"  # 本地环境不使用 HA
        # 数据库配置（使用默认值，不依赖 Secret）
        - name: DATABASE_HOST
          value: "host.docker.internal"
        - name: DATABASE_PORT
          value: "1521"
        - name: DATABASE_USERNAME
          value: "finance_user"
        - name: DATABASE_PASSWORD
          value: "finance_user"
        - name: DATABASE_SID
          value: "helowin"
        - name: DATABASE_SCHEMA
          value: "finance_user"
        - name: DATABASE_TABLES
          value: "trans_info"
        - name: OUTPUT_PATH
          value: "/opt/flink/output/cdc"
        - name: TZ
          value: "Asia/Shanghai"
        - name: AUTO_SUBMIT_JOB
          value: "false"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf
        - name: flink-data
          mountPath: /opt/flink/checkpoints
          subPath: checkpoints
        - name: flink-data
          mountPath: /opt/flink/savepoints
          subPath: savepoints
        - name: flink-data
          mountPath: /opt/flink/ha
          subPath: ha
        - name: flink-data
          mountPath: /opt/flink/output
          subPath: output
        - name: flink-logs
          mountPath: /opt/flink/logs
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
          items:
          - key: flink-conf.yaml
            path: flink-conf.yaml
          - key: log4j-console.properties
            path: log4j-console.properties
      - name: flink-data
        hostPath:
          path: /tmp/flink-data  # 本地开发：使用 hostPath
          type: DirectoryOrCreate
      - name: flink-logs
        emptyDir: {}
